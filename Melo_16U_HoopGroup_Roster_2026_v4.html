<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Melo 16U HoopGroup — 2026 Roster</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0a1628;
    --red: #cc0000;
    --red-light: #fdeaea;
    --gold: #c9992a;
    --gold-light: #f5e6c4;
    --cream: #faf8f4;
    --white: #ffffff;
    --gray-100: #f4f4f2;
    --gray-200: #e8e6e2;
    --gray-400: #9e9b95;
    --gray-700: #4a4845;
    --text: #1a1917;
    --radius: 12px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  /* ── Header ── */
  .site-header { background: var(--navy); color: white; padding: 1.75rem 3rem 1.5rem; }
  .header-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; gap: 1.5rem; }
  .logo-img { width: 160px; height: 56px; border-radius: 0; object-fit: contain; flex-shrink: 0; }
  .header-text h1 { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; line-height: 1.2; }
  .header-text p { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; letter-spacing: 0.7px; text-transform: uppercase; }
  .red-bar { height: 3px; background: var(--red); }

  /* ── Sort bar ── */
  .controls-bar { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 0 3rem; position: sticky; top: 0; z-index: 20; }
  .controls-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; height: 50px; gap: 0; }
  .sort-label { font-size: 11px; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.8px; margin-right: 10px; white-space: nowrap; }
  .sort-btn { height: 50px; padding: 0 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--gray-700); background: transparent; border: none; border-bottom: 2.5px solid transparent; cursor: pointer; white-space: nowrap; transition: color 0.15s, border-color 0.15s; }
  .sort-btn:hover { color: var(--navy); }
  .sort-btn.active { color: var(--navy); font-weight: 600; border-bottom-color: var(--red); }
  .player-count { margin-left: auto; font-size: 12px; color: var(--gray-400); }

  /* ── Grid ── */
  .roster-section { max-width: 1280px; margin: 0 auto; padding: 2rem 3rem 4rem; }
  .player-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

  /* ── Card ── */
  .player-card { background: var(--white); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--gray-200); transition: box-shadow 0.2s, transform 0.2s; }
  .player-card:hover { box-shadow: 0 8px 28px rgba(10,22,40,0.12); transform: translateY(-2px); }

  /* ── Headshot ── */
  .headshot-zone {
    background: linear-gradient(170deg, #2a2a2a 0%, #1a1a1a 100%);
    height: 260px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .headshot-zone img.real-photo { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; }
  .headshot-placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .initials-circle {
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--red); color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 600; letter-spacing: 1px;
    border: 3px solid rgba(255,255,255,0.15);
  }
  .upload-hint { font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.6px; }
  .jersey-badge {
    position: absolute; top: 10px; left: 10px;
    background: var(--red); color: white;
    font-size: 11px; font-weight: 700; padding: 3px 9px;
    border-radius: 20px; letter-spacing: 0.3px;
  }
  .no-jersey { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.5); }

  /* ── Card body ── */
  .card-body { padding: 14px 15px 15px; }
  .player-name { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--navy); line-height: 1.25; }
  .player-preferred { font-size: 12px; color: var(--red); font-weight: 500; margin-top: 2px; min-height: 18px; }
  /* name-block reserves consistent height so tags always sit at same vertical position */
  .name-block { min-height: 54px; }

  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .tag { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200); letter-spacing: 0.2px; }
  .tag.pos { background: var(--red-light); color: #8a0000; border-color: #f5aaaa; }
  .tag.year { background: var(--navy); color: white; font-weight: 700; border-color: var(--navy); }

  .meta-table { margin-top: 11px; padding-top: 11px; border-top: 1px solid var(--gray-100); display: flex; flex-direction: column; gap: 5px; }
  .meta-row { display: flex; gap: 7px; font-size: 11.5px; align-items: flex-start; }
  .meta-key { color: var(--gray-400); min-width: 62px; flex-shrink: 0; text-transform: uppercase; font-size: 9.5px; letter-spacing: 0.5px; padding-top: 2px; }
  .meta-val { color: var(--gray-700); line-height: 1.4; }
  .meta-val.empty { color: var(--gray-200); font-style: italic; }

  /* school link + map */
  .school-wrap { display: flex; align-items: flex-start; gap: 5px; flex: 1; }
  .school-link { color: var(--navy); text-decoration: none; font-weight: 500; line-height: 1.4; border-bottom: 1px dashed var(--gray-200); transition: border-color 0.15s, color 0.15s; }
  .school-link:hover { color: var(--red); border-bottom-color: var(--red); }
  .map-icon { flex-shrink: 0; display: inline-flex; align-items: center; margin-top: 1px; color: var(--gray-400); transition: color 0.15s; cursor: pointer; text-decoration: none; }
  .map-icon:hover { color: var(--red); }
  .map-icon svg { width: 13px; height: 13px; }

  @media (max-width: 1100px) {
    .player-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 760px) {
    .player-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .site-header, .controls-bar { padding-left: 1rem; padding-right: 1rem; }
    .roster-section { padding: 1.5rem 1rem 3rem; }
    .player-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
    .headshot-zone { height: 200px; }
  }
</style>
</head>

  });

  grid.innerHTML = sorted.map(p => {
    const initials = (p.first[0] + p.last[0]).toUpperCase();
    const jerseyTag = p.jersey
      ? `<div class="jersey-badge">#${p.jersey}</div>`
      : `<div class="jersey-badge no-jersey">—</div>`;
    // Always render preferred line - empty keeps consistent height for cards without preferred name
    const preferred = p.preferred
      ? `<div class="player-preferred">"${p.preferred}"</div>`
      : `<div class="player-preferred"></div>`;
    const pos  = p.pos  ? `<span class="tag pos">${p.pos}</span>`  : '';
    const ht   = p.height ? `<span class="tag">${p.height}</span>` : '';
    const year = `<span class="tag year">${p.grad}</span>`;

    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.mapsQuery)}`;
    const schoolCell = `
      <div class="school-wrap">
        <a class="school-link" href="${p.schoolUrl}" target="_blank" rel="noopener">${p.school}</a>
        <a class="map-icon" href="${mapsUrl}" target="_blank" rel="noopener" title="View on Google Maps">${mapIcon}</a>
      </div>`;

    const hometown = p.hometown
      ? `<div class="meta-row"><span class="meta-key">Hometown</span><span class="meta-val">${p.hometown}</span></div>`
      : `<div class="meta-row"><span class="meta-key">Hometown</span><span class="meta-val empty">—</span></div>`;

    return `
    <div class="player-card">
      <div class="headshot-zone">
        <div class="headshot-placeholder">
          <div class="initials-circle">${initials}</div>
          <div class="upload-hint">Upload photo</div>
        </div>
        ${jerseyTag}
      </div>
      <div class="card-body">
        <div class="name-block">
          <div class="player-name">${p.first} ${p.last}</div>
          ${preferred}
        </div>
        <div class="tags">${pos}${ht}${year}</div>
        <div class="meta-table">
          <div class="meta-row"><span class="meta-key">School</span>${schoolCell}</div>
          ${hometown}
        </div>
      </div>
    </div>`;
  }).join('');
}

renderGrid();
</script>
</body>
</html>
